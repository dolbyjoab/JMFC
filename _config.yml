# Site settings
title: JollyMinou FC
email: jollyminoufc@gmail.com
url: https://jollyminoufc.com
description: "JollyMinou FC is a Haitian football club built for community, competition, and celebration."
keywords: "football, soccer, club, Haiti, community"
skills: "Live the game. Lead the club. Love the journey."
meta_author: JollyMinou FC Team

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 0d1e3a
  primary-rgb: "13,30,58"
  secondary: e1b12c
  secondary-dark: 9a6d1f

# Footer settings
footer:
  copyright: JollyMinou FC
  location: FL, USA
  credits: Community & Champions
  social: Follow us

