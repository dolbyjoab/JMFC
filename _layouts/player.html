<!DOCTYPE html>
<html>
{% include head.html %}

<body id="page-top" class="player-page">
  {% include nav.html %}
  <section class="player-hero">
    <div class="container">
      <div class="row">
        <div class="col-md-6 hero-copy">
          <h1>{{ page.title }}</h1>
          <p class="player-position">{{ page.position }}</p>
          <p class="player-goal">{{ page.goal }}</p>
          <ul class="player-meta-list">
            <li><strong>Jersey:</strong> {{ page.number }}</li>
            <li><strong>Attributes:</strong> {{ page.stats }}</li>
          </ul>
        </div>
        <div class="col-md-6 hero-image">
          <img src="{{ '/img/portfolio/' | append: page.img | relative_url }}" alt="{{ page.alt }}" class="img-responsive">
        </div>
      </div>
    </div>
  </section>
  <div class="container player-page-content">
    <div class="row">
      <div class="col-md-10 col-md-offset-1">
        {{ content }}
      </div>
    </div>
  </div>
  {% include footer.html %}
  {% include js.html %}
</body>
</html>
